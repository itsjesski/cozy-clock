name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Extract Release Notes from CHANGELOG
        id: changelog
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');

            const lines = changelog.split('\n');
            let releaseNotes = '';
            let foundFirstRelease = false;
            let inLatestRelease = false;

            for (const line of lines) {
              if (line.startsWith('# Changelog')) {
                continue;
              }

              if (line.startsWith('## [') && !foundFirstRelease) {
                foundFirstRelease = true;
                inLatestRelease = true;
                releaseNotes += line + '\n';
                continue;
              }

              if (inLatestRelease && line.startsWith('## [') && foundFirstRelease) {
                break;
              }

              if (inLatestRelease) {
                releaseNotes += line + '\n';
              }
            }

            releaseNotes = releaseNotes.trim();

            if (!releaseNotes) {
              releaseNotes = 'See CHANGELOG.md for details.';
            }

            core.setOutput('notes', releaseNotes);

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: 'dist/*.exe'
          draft: false
          prerelease: false
          body: ${{ steps.changelog.outputs.notes }}
          token: ${{ secrets.GITHUB_TOKEN }}
