name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: 'dist/*.exe'
          draft: false
          prerelease: false
          body: |
            See CHANGELOG.md for details.
